services:
  # Base de datos relacional (RF-008)
  kairos-db:
    image: postgres:16-alpine
    container_name: kairos-db
    environment:
      - POSTGRES_USER=kairos
      - POSTGRES_PASSWORD=kairos
      - POSTGRES_DB=kairos
    ports:
      - "5432:5432"
    volumes:
      - kairos-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kairos -d kairos"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - kairos-network

  # Backend API
  kairos-api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: kairos-api
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - ./data:/app/data
      - ./config:/app/config
      - ./scripts:/app/scripts
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
    environment:
      - KAIROS_ENV=development
      - PYTHONPATH=/app/src
      - DATABASE_URL=postgresql+psycopg://kairos:kairos@kairos-db:5432/kairos
    command: ["python", "scripts/run_api.py"]
    depends_on:
      kairos-db:
        condition: service_healthy
    networks:
      - kairos-network

  # Frontend Dashboard
  kairos-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kairos-frontend
    ports:
      - "8080:80"
    depends_on:
      - kairos-api
    networks:
      - kairos-network

volumes:
  kairos-pgdata:

networks:
  kairos-network:
    driver: bridge
