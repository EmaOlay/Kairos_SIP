services:
  # Backend API
  kairos-api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: kairos-api
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - ./data:/app/data
      - ./config:/app/config
      - ./scripts:/app/scripts
    environment:
      - KAIROS_ENV=development
      - PYTHONPATH=/app/src
    command: ["python", "scripts/run_api.py"]
    networks:
      - kairos-network

  # Frontend Dashboard
  kairos-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kairos-frontend
    ports:
      - "8080:80"
    depends_on:
      - kairos-api
    networks:
      - kairos-network

networks:
  kairos-network:
    driver: bridge
